version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: streamvault-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: streamvault-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/streamvault
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: streamvault-ui
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
